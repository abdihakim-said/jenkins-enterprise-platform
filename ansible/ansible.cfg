[defaults]
# Jenkins Enterprise Platform - Ansible Configuration
# Version: 2.0

# Basic Configuration
inventory = inventory/hosts
roles_path = roles
host_key_checking = False
retry_files_enabled = False
gathering = smart
fact_caching = memory
fact_caching_timeout = 86400

# Output Configuration
stdout_callback = yaml
bin_ansible_callbacks = True
display_skipped_hosts = False
display_ok_hosts = True

# SSH Configuration
remote_user = ubuntu
private_key_file = ~/.ssh/jenkins-enterprise-platform-key.pem
timeout = 30
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes

# Privilege Escalation
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# Performance
forks = 10
poll_interval = 15
internal_poll_interval = 0.001

# Logging
log_path = /tmp/ansible.log

[inventory]
enable_plugins = aws_ec2, host_list, script, auto, yaml, ini, toml

[ssh_connection]
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes
control_path_dir = /tmp/.ansible-cp
control_path = %(directory)s/%%h-%%p-%%r
pipelining = True
retries = 3
